<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pamuk Öğretmen v15.2 - Flash Lite</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0d0d0f; --card: #16161e; --accent: #c38fff; --text: #f0f0f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; overflow: hidden; }

        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--accent); }

        .char-pane {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            background: radial-gradient(circle at center, #1e1b2e 0%, #0d0d0f 100%);
            border-right: 1px solid #2d2d35;
        }
        #teacher-svg {
            width: 78%;
            max-width: 260px;
            filter: drop-shadow(0 4px 24px rgba(195,143,255,0.25));
        }
        #teacher-name-label {
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            opacity: 0.9;
        }

        .chat-pane { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0f0f14; }
        #chat-window { flex: 1; overflow-y: auto; background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; box-shadow: inset 0 4px 30px rgba(0,0,0,0.6); }

        .bubble { padding: 16px 20px; border-radius: 22px; max-width: 85%; font-size: 1rem; line-height: 1.6; }
        .ai   { background: #232331; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }

        .btn-mic { width: 76px; height: 76px; border-radius: 50%; border: none; background: var(--accent); font-size: 34px; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(195,143,255,0.3); transition: background 0.3s; }
        .btn-mic.listening { background: #ff5c5c; animation: pulse-mic 1s infinite; }
        .btn-mic.blocked   { background: #444; cursor: not-allowed; }
        @keyframes pulse-mic { 0%,100%{ box-shadow:0 0 0 0 rgba(255,92,92,0.5);} 50%{ box-shadow:0 0 0 14px rgba(255,92,92,0);} }

        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 32px; width: 100%; max-width: 480px; text-align: center; border: 1px solid #333; overflow-y: auto; max-height: 90vh; }

        label { display: block; text-align: left; margin: 10px 0 5px 10px; font-size: 0.9rem; color: var(--accent); }
        .sub-label { display: block; text-align: left; margin: -2px 0 10px 10px; font-size: 0.75rem; color: #888; }
        input, select { width: 100%; padding: 15px; margin: 5px 0 15px 0; border-radius: 14px; border: 2px solid #3d3d4d; background: #050507; color: #fff; font-size: 1rem; }
        .range-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }

        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer; font-size: 1rem; }

        .choice-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .choice-btn { flex: 1; padding: 14px; border-radius: 14px; border: 2px solid #3d3d4d; background: #050507; color: #fff; font-size: 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .choice-btn.selected { border-color: var(--accent); background: rgba(195,143,255,0.15); color: var(--accent); font-weight: 700; }

        .grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .grade-group-label { grid-column: 1/-1; text-align: left; color: #888; font-size: 0.8rem; padding: 4px 2px; }
        .q-label { color: var(--accent); font-weight: bold; margin-bottom: 12px; font-size: 1.05rem; }

        #mic-status { text-align: center; font-size: 0.75rem; color: #888; margin-top: 6px; min-height: 18px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="setup-card">
        <h2>Pamuk Ayarları ⚙️</h2>

        <div id="api-panel">
            <label>API Anahtarı</label>
            <input type="password" id="key-primary" placeholder="Gemini API Anahtarı">
            <span class="sub-label">* Doğal ses için Google Cloud Console'dan "Cloud Text-to-Speech API" aktif edilmelidir. Aksi halde standart sese geçer.</span>
            
            <label>Yedek Ses Seçimi (Native)</label>
            <select id="voice-select"><option value="">Sesler Hazırlanıyor...</option></select>
            
            <label>Konuşma Hızı</label>
            <div class="range-wrap"><input type="range" id="rate-range" min="0.5" max="1.5" step="0.1" value="1.0"></div>
            
            <label>Ses Tonu (Pitch)</label>
            <div class="range-wrap"><input type="range" id="pitch-range" min="0.5" max="1.5" step="0.1" value="1.0"></div>
            
            <button class="btn-action" style="background:#2d2d35;color:white;margin-bottom:10px;" onclick="testVoice()">Sesi Dene 🔊</button>
            <button class="btn-action" onclick="saveConfig()">Kaydet ve Devam Et →</button>
        </div>

        <div id="profile-panel" class="hidden">
            <div id="step-teacher">
                <p class="q-label">👩‍🏫 Öğretmenin adı ne olsun?</p>
                <input type="text" id="q-teacher" placeholder="Örn: Ayşe Öğretmen">
                <button class="btn-action" onclick="goToStudentName()">İlerle →</button>
            </div>
            <div id="step-name" class="hidden">
                <p class="q-label">Öğrencinin adı ne?</p>
                <input type="text" id="q-name" placeholder="Adını yaz...">
                <button class="btn-action" onclick="goToGender()">İlerle →</button>
            </div>
            <div id="step-gender" class="hidden">
                <p class="q-label">Cinsiyetin?</p>
                <div class="choice-group">
                    <button class="choice-btn" id="btn-kiz"   onclick="selectGender('Kız')">👧 Kız</button>
                    <button class="choice-btn" id="btn-erkek" onclick="selectGender('Erkek')">👦 Erkek</button>
                </div>
                <button class="btn-action" onclick="goToGrade()">İlerle →</button>
            </div>
            <div id="step-grade" class="hidden">
                <p class="q-label">Kaçıncı sınıftasın?</p>
                <div class="grade-grid">
                    <div class="grade-group-label">📚 İlkokul</div>
                    <button class="choice-btn" onclick="selectGrade(this,'İlkokul 1. Sınıf')">1. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'İlkokul 2. Sınıf')">2. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'İlkokul 3. Sınıf')">3. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'İlkokul 4. Sınıf')">4. Sınıf</button>
                    <div class="grade-group-label">🏫 Ortaokul</div>
                    <button class="choice-btn" onclick="selectGrade(this,'Ortaokul 5. Sınıf')">5. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'Ortaokul 6. Sınıf')">6. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'Ortaokul 7. Sınıf')">7. Sınıf</button>
                    <button class="choice-btn" onclick="selectGrade(this,'Ortaokul 8. Sınıf')">8. Sınıf</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="app-shell">
    <button class="settings-trigger" onclick="openSettings()">⚙️</button>
    <div class="char-pane">

        <div id="teacher-name-label">👩‍🏫 Öğretmen</div>

    <div class="chat-pane">
        <div id="chat-window"></div>
        <button class="btn-mic" id="mic-btn">🎤</button>
        <div id="mic-status">Başlamak için mikrofona bas</div>

</div>

<script>
    let synth = window.speechSynthesis;
    let voices = [];
    let selectedVoice = null;
    let p           = JSON.parse(localStorage.getItem('p_v15_prof')) || {};
    let k1          = localStorage.getItem('p_v15_k1');
    let teacherName = localStorage.getItem('p_v15_teacher') || 'Pamuk Öğretmen';
    let selectedGender = p.gender || null;

    let micActive       = false;
    let teacherSpeaking = false;

    /* Beep */
    function playBeep() {
        try {
            const ctx  = new (window.AudioContext || window.webkitAudioContext)();
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
        } catch(e) {}
    }

    /* Recognition */
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'tr-TR'; rec.continuous = false; rec.interimResults = false;

    function startListening() {
        if (teacherSpeaking) return;
        try { rec.start(); setMicUI('listening'); } catch(e) {}
    }
    rec.onresult = (e) => {
        const t = e.results[0][0].transcript;
        addB(t, 'user'); setMicUI('blocked'); callAI(t);
    };
    rec.onend   = () => { if (!teacherSpeaking && micActive) setMicUI('ready'); };
    rec.onerror = () => { if (!teacherSpeaking && micActive) setMicUI('ready'); };

    function setMicUI(state) {
        const btn = document.getElementById('mic-btn');
        const st  = document.getElementById('mic-status');
        btn.className = 'btn-mic';
        if      (state==='listening') { btn.classList.add('listening'); btn.textContent='🔴'; st.textContent='Dinliyorum...'; }
        else if (state==='blocked')   { btn.classList.add('blocked');   btn.textContent='⏸️'; st.textContent='Öğretmen konuşuyor...'; }
        else if (state==='ready')     { btn.textContent='🎤'; st.textContent='Seni dinliyorum, konuş!'; }
        else                          { btn.textContent='🎤'; st.textContent='Başlamak için mikrofona bas'; }
    }

    document.getElementById('mic-btn').onclick = () => {
        if (!micActive) { micActive = true; startListening(); }
        else if (!teacherSpeaking) { startListening(); }
    };

    /* Voices (Native Fallback için) */
    function loadVoices() {
        let all = synth.getVoices();
        voices = all.filter(v => v.lang.startsWith('tr'));
        if (!voices.length) voices = all;
        const sel = document.getElementById('voice-select');
        if (!sel) return;
        sel.innerHTML = '';
        voices.forEach((v,i) => { const o=document.createElement('option'); o.value=i; o.innerText=v.name; sel.appendChild(o); });
        const saved = localStorage.getItem('p_v15_voice_name');
        if (saved) { const idx=voices.findIndex(v=>v.name===saved); if(idx!==-1) sel.value=idx; }
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

    function testVoice() { 
        k1 = document.getElementById('key-primary').value.trim();
        updateVoiceParams(); 
        speak("Merhaba! Ses ayarlarım bu şekilde, nasıl buldun?"); 
    }
    
    function updateVoiceParams() {
        const idx = document.getElementById('voice-select').value;
        selectedVoice = voices[idx] || voices[0] || null;
    }

    /* Asenkron Speak (Google Cloud TTS + Web Speech Fallback) */
    async function speak(text) {
        synth.cancel(); // Eski native ses varsa sustur
        teacherSpeaking = true; 
        setMicUI('blocked');
        
        const mO = 'M 85 152 Q 100 168 115 152'; // Açık ağız
        const mC = 'M 85 152 Q 100 159 115 152'; // Kapalı ağız
        const rate = parseFloat(localStorage.getItem('p_v15_rate')  || 1.0);
        const pitch = parseFloat(localStorage.getItem('p_v15_pitch') || 1.0);

        try {
            if (!k1) throw new Error("API Anahtarı yok, fallback'e geç.");

            // 1. Google Cloud TTS (Neural2-D Kadın Sesi) Denemesi
            const requestBody = {
                input: { text: text },
                voice: { languageCode: 'tr-TR', name: 'tr-TR-Neural2-D' },
                audioConfig: { audioEncoding: 'MP3', speakingRate: rate, pitch: pitch }
            };

            const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${k1}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) throw new Error('Cloud TTS yetkisi yok veya kota dolu.');

            const data = await response.json();
            if (!data.audioContent) throw new Error('Ses datası boş.');

            // Base64 sesi oynat
            const audio = new Audio('data:audio/mp3;base64,' + data.audioContent);

            audio.onplay = () => document.getElementById('mouth').setAttribute('d', mO);
            audio.onended = () => {
                document.getElementById('mouth').setAttribute('d', mC);
                teacherSpeaking = false;
                if (micActive) setTimeout(() => { playBeep(); setTimeout(startListening, 300); }, 300);
            };
            audio.onerror = () => { throw new Error('Audio etiketi sesi çalamadı.'); };

            await audio.play();

        } catch (e) {
            console.warn("Doğal Ses (Cloud TTS) kullanılamadı, Native sese dönüldü: ", e.message);
            
            // 2. Web Speech API (Fallback)
            const u = new SpeechSynthesisUtterance(text);
            u.voice = selectedVoice || voices[0] || null;
            u.lang  = 'tr-TR';
            u.rate  = rate;
            u.pitch = pitch;

            u.onstart = () => document.getElementById('mouth').setAttribute('d', mO);
            u.onend   = () => {
                document.getElementById('mouth').setAttribute('d', mC);
                teacherSpeaking = false;
                if (micActive) setTimeout(() => { playBeep(); setTimeout(startListening, 300); }, 300);
            };
            u.onerror = () => {
                document.getElementById('mouth').setAttribute('d', mC);
                teacherSpeaking = false;
                if (micActive) setTimeout(() => { playBeep(); startListening(); }, 400);
            };
            synth.speak(u);
        }
    }

    function updateTeacherLabel() {
        const lbl = document.getElementById('teacher-name-label');
        if (lbl) lbl.textContent = '👩‍🏫 ' + teacherName;
    }

    /* Onboarding */
    function saveConfig() {
        k1 = document.getElementById('key-primary').value.trim();
        updateVoiceParams();
        if (!k1) return alert("API anahtarı gerekli.");
        localStorage.setItem('p_v15_k1', k1);
        localStorage.setItem('p_v15_voice_name', selectedVoice ? selectedVoice.name : '');
        localStorage.setItem('p_v15_rate',  document.getElementById('rate-range').value);
        localStorage.setItem('p_v15_pitch', document.getElementById('pitch-range').value);
        document.getElementById('api-panel').classList.add('hidden');
        document.getElementById('profile-panel').classList.remove('hidden');
        showStep('step-teacher');
        speak("Harika! Şimdi öğretmenin adını öğrenebilir miyim?");
    }

    function showStep(id) {
        ['step-teacher','step-name','step-gender','step-grade'].forEach(s =>
            document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function goToStudentName() {
        const v = document.getElementById('q-teacher').value.trim();
        if (!v) return alert("Lütfen öğretmen adını yaz.");
        teacherName = v;
        localStorage.setItem('p_v15_teacher', v);
        updateTeacherLabel();
        showStep('step-name');
        speak("Güzel! Peki öğrencinin adı ne?");
    }

    function goToGender() {
        const v = document.getElementById('q-name').value.trim();
        if (!v) return alert("Lütfen adını yaz.");
        p.name = v;
        showStep('step-gender');
        speak("Harika! Şimdi cinsiyetini seçer misin?");
    }

    function selectGender(g) {
        selectedGender = g;
        document.querySelectorAll('#step-gender .choice-btn').forEach(b=>b.classList.remove('selected'));
        document.getElementById(g==='Kız'?'btn-kiz':'btn-erkek').classList.add('selected');
    }

    function goToGrade() {
        if (!selectedGender) return alert("Lütfen cinsiyetini seç.");
        p.gender = selectedGender;
        showStep('step-grade');
        speak("Güzel! Hangi sınıfta olduğunu seçelim.");
    }

    function selectGrade(el, g) {
        p.grade = g;
        document.querySelectorAll('#step-grade .choice-btn').forEach(b=>b.classList.remove('selected'));
        el.classList.add('selected');
        setTimeout(() => {
            localStorage.setItem('p_v15_prof', JSON.stringify(p));
            document.getElementById('onboarding').classList.add('hidden');
            greet();
        }, 400);
    }

    function openSettings() {
        document.getElementById('onboarding').classList.remove('hidden');
        document.getElementById('api-panel').classList.remove('hidden');
        document.getElementById('profile-panel').classList.add('hidden');
        if (k1) document.getElementById('key-primary').value = k1;
    }

    /* Chat */
    function greet() {
        updateTeacherLabel();
        const m = `Merhaba ${p.name}! Ben ${teacherName}. ${p.grade} öğrencisi olduğunu öğrendim. Bugün hangi konuda çalışmak istersin?`;
        addB(m, 'ai'); speak(m);
    }

    function addB(t, cl) {
        const w = document.getElementById('chat-window');
        const b = document.createElement('div');
        b.className = `bubble ${cl}`; b.innerText = t;
        w.appendChild(b); w.scrollTop = w.scrollHeight;
    }

    /* AI - Model: gemini-flash-lite-latest (Ücretsiz/Hızlı Kullanım) */
    async function callAI(text) {
        const prompt = `Sen deneyimli ve sıcakkanlı bir öğretmensin. Adın ${teacherName}.
Karşındaki öğrencinin adı ${p.name}, ${p.grade} öğrencisi, cinsiyeti ${p.gender}.
KONUŞMA KURALLARI:
- Öğrenciye adıyla ya da "sen" diye hitap et.
