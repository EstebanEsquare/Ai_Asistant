<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pamuk</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #bb86fc; --text: #e0e0e0; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        
        .container { display: flex; height: 100vh; width: 100vw; }

        /* Sol Panel - Yeni Kedi Tasarımı */
        .character-pane {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border-right: 1px solid #333;
        }
        #cat-container { width: 70%; position: relative; }
        .cat-svg { width: 100%; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }

        /* Sağ Panel - Chat */
        .chat-pane { flex: 1; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #chat-window {
            flex: 1; overflow-y: auto; background: var(--card); border-radius: 20px;
            padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .bubble { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 1rem; line-height: 1.4; }
        .ai { background: #3700b3; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }

        #mic-btn {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            background: var(--accent); font-size: 28px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4); margin: 0 auto;
        }

        /* Onboarding */
        #onboarding {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px;
        }
        input {
            width: 100%; max-width: 300px; padding: 15px; margin: 15px 0;
            border-radius: 12px; border: 2px solid var(--accent); background: transparent; color: #fff; text-align: center;
        }
        .btn { padding: 15px 40px; border-radius: 25px; border: none; background: var(--accent); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="onboarding">
    <div id="setup-ui">
        <h2>Hoş Geldin! 🐾</h2>
        <p>Devam etmek için OpenAI API anahtarını gir:</p>
        <input type="password" id="api-key" placeholder="sk-...">
        <br><button class="btn" onclick="saveApiKey()">Başlayalım</button>
    </div>
    <div id="profile-ui" class="hidden">
        <h2 id="q-text"></h2>
        <input type="text" id="q-input" placeholder="Cevabın...">
        <br><button class="btn" onclick="nextStep()">İleri</button>
    </div>
</div>

<div class="container">
    <div class="character-pane">
        <div id="cat-container">
            <svg class="cat-svg" viewBox="0 0 200 220">
                <!-- Kulaklar -->
                <path d="M40 60 L10 10 L60 40 Z" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
                <path d="M160 60 L190 10 L140 40 Z" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
                <path d="M45 55 L25 25 L55 45 Z" fill="#ffc0cb"/>
                <path d="M155 55 L175 25 L145 45 Z" fill="#ffc0cb"/>
                <!-- Kafa -->
                <ellipse cx="100" cy="110" rx="85" ry="75" fill="#fff" stroke="#ccc" stroke-width="1"/>
                <!-- Gözler -->
                <circle cx="70" cy="100" r="10" fill="#000"/>
                <circle cx="130" cy="100" r="10" fill="#000"/>
                <circle cx="73" cy="97" r="3" fill="#fff"/>
                <circle cx="133" cy="97" r="3" fill="#fff"/>
                <!-- Burun ve Ağız -->
                <path d="M95 125 L105 125 L100 132 Z" fill="#ffc0cb"/>
                <path id="mouth" d="M85 145 Q100 145 115 145" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
                <!-- Bıyıklar -->
                <line x1="50" y1="125" x2="20" y2="120" stroke="#ccc" />
                <line x1="50" y1="135" x2="20" y2="140" stroke="#ccc" />
                <line x1="150" y1="125" x2="180" y2="120" stroke="#ccc" />
                <line x1="150" y1="135" x2="180" y2="140" stroke="#ccc" />
            </svg>
        </div>
    </div>
    <div class="chat-pane">
        <div id="chat-window"></div>
        <button id="mic-btn">🎤</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    };
                };
            });
        });
    }

    let profile = JSON.parse(localStorage.getItem('p_prof')) || {};
    let apiKey = localStorage.getItem('p_key');
    let step = 0;
    const qs = ["Adın ne?", "Kaç yaşındasın?", "Cinsiyetin?", "Kaçıncı sınıfa gidiyorsun?"];
    const ks = ["name", "age", "gender", "grade"];

    const synth = window.speechSynthesis;
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Speech();
    rec.lang = 'tr-TR';

    function saveApiKey() {
        const val = document.getElementById('api-key').value;
        if(val.startsWith('sk-')) {
            localStorage.setItem('p_key', val);
            apiKey = val;
            startProfile();
        } else {
            alert("Lütfen geçerli bir OpenAI anahtarı girin.");
        }
    }

    function startProfile() {
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('profile-ui').classList.remove('hidden');
        ask();
    }

    function ask() {
        document.getElementById('q-text').innerText = qs[step];
        speak(qs[step]);
    }

    function nextStep() {
        const val = document.getElementById('q-input').value;
        if(!val) return;
        profile[ks[step]] = val;
        document.getElementById('q-input').value = "";
        step++;
        if(step < qs.length) ask();
        else {
            localStorage.setItem('p_prof', JSON.stringify(profile));
            document.getElementById('onboarding').classList.add('hidden');
            greet();
        }
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'tr-TR';
        u.onstart = () => document.getElementById('mouth').setAttribute('d', 'M85 145 Q100 165 115 145');
        u.onend = () => document.getElementById('mouth').setAttribute('d', 'M85 145 Q100 145 115 145');
        synth.speak(u);
    }

    function greet() {
        const m = `Hoş geldin ${profile.name}! Pamuk seninle çalışmaya hazır.`;
        addB(m, 'ai'); speak(m);
    }

    function addB(t, s) {
        const w = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `bubble ${s}`;
        d.innerText = t;
        w.appendChild(d);
        w.scrollTop = w.scrollHeight;
    }

    document.getElementById('mic-btn').onclick = () => rec.start();
    rec.onresult = (e) => {
        const t = e.results[0][0].transcript;
        addB(t, 'user');
        processAI(t);
    };

    async function processAI(userText) {
        // OpenAI Fetch mantığı buraya gelecek. Şimdilik hızlı yanıt:
        const r = `${profile.grade}. sınıf müfredatına göre bu harika bir soru!`;
        addB(r, 'ai'); speak(r);
    }

    window.onload = () => {
        if(!apiKey) return;
        if(!profile.grade) startProfile();
        else {
            document.getElementById('onboarding').classList.add('hidden');
            greet();
        }
    };
</script>
</body>
</html>
