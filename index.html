<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pamuk Öğretmen</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0d0d0f; --card: #16161e; --accent: #c38fff; --text: #f0f0f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; overflow: hidden; }
        
        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* Ayarlar Butonu */
        .settings-trigger { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .char-pane { flex: 1.2; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1e1b2e 0%, #0d0d0f 100%); border-right: 1px solid #2d2d35; }
        #cat-svg { width: 85%; max-width: 380px; filter: drop-shadow(0 0 20px rgba(195, 143, 255, 0.2)); }

        .chat-pane { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0f0f14; }
        #chat-window { flex: 1; overflow-y: auto; background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; box-shadow: inset 0 4px 30px rgba(0,0,0,0.6); }
        .bubble { padding: 16px 20px; border-radius: 22px; max-width: 85%; font-size: 1rem; line-height: 1.6; }
        .ai { background: #232331; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .user { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }

        .btn-mic { width: 76px; height: 76px; border-radius: 50%; border: none; background: var(--accent); font-size: 34px; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(195, 143, 255, 0.3); }

        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .setup-card { background: var(--card); padding: 35px; border-radius: 32px; width: 100%; max-width: 480px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 18px; margin: 8px 0; border-radius: 16px; border: 2px solid #3d3d4d; background: #050507; color: #fff; font-size: 1.1rem; text-align: center; }
        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-test { background: #2d2d35; color: white; margin-bottom: 10px; font-size: 0.9rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="setup-card">
        <h2 id="st-title">Merhaba! 👋</h2>
        <div id="api-panel">
            <p id="st-desc" style="color: #999;">Lütfen API ayarlarını yapılandırın.</p>
            <input type="password" id="key-primary" placeholder="Ana API Anahtarı (Gemini/OpenAI)">
            <input type="password" id="key-backup" placeholder="Yedek API Anahtarı (Opsiyonel)">
            <button class="btn-action btn-test" onclick="testCurrentKey()">Seçili Anahtarı Test Et</button>
            <button class="btn-action" onclick="saveKeys()">Kaydet ve Devam Et</button>
        </div>
        <div id="profile-panel" class="hidden">
            <p id="q-text" style="color: var(--accent); font-weight: bold;"></p>
            <input type="text" id="q-input" placeholder="Cevabınız...">
            <button class="btn-action" onclick="nextProfileStep()">İlerle</button>
        </div>
    </div>
</div>

<div class="app-shell">
    <button class="settings-trigger" onclick="openSettings()">⚙️</button>
    <div class="char-pane">
        <div id="cat-svg">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="110" r="85" fill="#ffffff" />
                <path d="M45 55 L15 5 L65 40 Z" fill="#ffffff" />
                <path d="M155 55 L185 5 L135 40 Z" fill="#ffffff" />
                <circle cx="70" cy="100" r="10" fill="#1a1a1a" />
                <circle cx="130" cy="100" r="10" fill="#1a1a1a" />
                <path d="M96 120 Q100 128 104 120" fill="#ffb6c1" />
                <path id="mouth" d="M85 140 Q100 140 115 140" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round" />
            </svg>
        </div>
    </div>
    <div class="chat-pane">
        <div id="chat-window"></div>
        <button class="btn-mic" id="mic-btn">🎤</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => console.log("PWA Aktif"));
        });
    }

    let p = JSON.parse(localStorage.getItem('p_v11_prof')) || {};
    let keyPrimary = localStorage.getItem('p_v11_key1');
    let keyBackup = localStorage.getItem('p_v11_key2');
    let step = 0;
    const qs = ["Adın ne?", "Kaç yaşındasın?", "Cinsiyetin?", "Kaçıncı sınıfa gidiyorsun?"];
    const ks = ["name", "age", "gender", "grade"];

    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'tr-TR';

    async function testCurrentKey() {
        const testKey = document.getElementById('key-primary').value.trim();
        if(!testKey) return alert("Lütfen önce bir anahtar girin.");
        
        alert("Bağlantı test ediliyor, lütfen bekleyin...");
        const result = await validateKey(testKey);
        if(result) alert("Başarılı! API anahtarı çalışıyor.");
        else alert("Hata! Anahtar geçersiz veya model erişimi kapalı.");
    }

    async function validateKey(k) {
        // Yeni preview model ismi ile test
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${k}`;
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
            });
            return res.ok;
        } catch(e) { return false; }
    }

    function saveKeys() {
        keyPrimary = document.getElementById('key-primary').value.trim();
        keyBackup = document.getElementById('key-backup').value.trim();
        if(!keyPrimary) return alert("Ana API anahtarı gereklidir.");
        
        localStorage.setItem('p_v11_key1', keyPrimary);
        localStorage.setItem('p_v11_key2', keyBackup);
        
        document.getElementById('api-panel').classList.add('hidden');
        document.getElementById('profile-panel').classList.remove('hidden');
        askProfile();
    }

    function askProfile() {
        document.getElementById('q-text').innerText = qs[step];
        speak(qs[step]);
    }

    function nextProfileStep() {
        const val = document.getElementById('q-input').value.trim();
        if(!val) return;
        p[ks[step]] = val;
        document.getElementById('q-input').value = "";
        step++;
        if(step < qs.length) askProfile();
        else {
            localStorage.setItem('p_v11_prof', JSON.stringify(p));
            document.getElementById('onboarding').classList.add('hidden');
            greet();
        }
    }

    function openSettings() {
        if(confirm("API Ayarlarını değiştirmek istiyor musunuz? Mevcut profiliniz korunacaktır.")) {
            document.getElementById('onboarding').classList.remove('hidden');
            document.getElementById('api-panel').classList.remove('hidden');
            document.getElementById('profile-panel').classList.add('hidden');
            document.getElementById('key-primary').value = keyPrimary || "";
            document.getElementById('key-backup').value = keyBackup || "";
        }
    }

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'tr-TR';
        u.onstart = () => document.getElementById('mouth').setAttribute('d', 'M85 140 Q100 165 115 140');
        u.onend = () => document.getElementById('mouth').setAttribute('d', 'M85 140 Q100 140 115 140');
        synth.speak(u);
    }

    function greet() {
        const m = `Merhaba ${p.name}! Bugün ${p.grade}. sınıf konularına bakmaya hazır mısın?`;
        addB(m, 'ai'); speak(m);
    }

    function addB(t, cl) {
        const w = document.getElementById('chat-window');
        const b = document.createElement('div');
        b.className = `bubble ${cl}`;
        b.innerText = t;
        w.appendChild(b);
        w.scrollTop = w.scrollHeight;
    }

    document.getElementById('mic-btn').onclick = () => recognition.start();
    recognition.onresult = (e) => {
        const t = e.results[0][0].transcript;
        addB(t, 'user');
        callAI(t);
    };

    async function callAI(text, isBackup = false) {
        const activeKey = isBackup ? keyBackup : keyPrimary;
        if(!activeKey) return;

        let url, body, headers;
        if (activeKey.startsWith('sk-')) {
            url = 'https://api.openai.com/v1/chat/completions';
            headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${activeKey}` };
            body = JSON.stringify({ model: "gpt-3.5-turbo", messages: [{role: "system", content: "Sen şefkatli bir ilkokul öğretmenisin."}, {role: "user", content: text}] });
        } else if (activeKey.startsWith('AIza')) {
            // gemini-3.1-flash-lite-preview modeli entegrasyonu
            url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${activeKey}`;
            headers = { 'Content-Type': 'application/json' };
            body = JSON.stringify({ contents: [{ parts: [{ text: `Sen öğretmen Pamuk'sun. Karşındaki çocuk: ${p.name}, Sınıf: ${p.grade}. Soru: ${text}` }] }] });
        }

        try {
            const res = await fetch(url, { method: 'POST', headers, body });
            const data = await res.json();
            
            if(!res.ok) throw new Error(data.error?.message || "API Erişilemiyor");
            
            let reply = activeKey.startsWith('AIza') ? data.candidates[0].content.parts[0].text : data.choices[0].message.content;
            addB(reply, 'ai'); speak(reply);
        } catch (e) {
            console.error(e);
            if(!isBackup && keyBackup) {
                addB("Ana anahtarda sorun oluştu, yedeğe bağlanıyorum...", 'ai');
                callAI(text, true);
            } else {
                addB(`Hata oluştu: ${e.message}. Lütfen Ayarlar (⚙️) kısmından anahtarınızı kontrol edin.`, 'ai');
            }
        }
    }

    window.onload = () => { if(keyPrimary && p.grade) { document.getElementById('onboarding').classList.add('hidden'); greet(); } };
</script>
</body>
</html>
