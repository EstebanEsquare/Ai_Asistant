<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil optimizasyon ve native his için zorunlu viewport ayarı -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Asistan - Öğretmen Modu</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Modern, Dark Mode Temalı UI */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-color: #6200ea;
            --primary-hover: #7c4dff;
            --danger-color: #cf6679;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Native his için kaydırmayı engelle */
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.4;
        }

        .user-msg {
            background-color: #2c2c2c;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .ai-msg {
            background-color: var(--primary-color);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        #controls {
            padding: 20px;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #333;
        }

        /* Dokunmatik hedefler için en az 44x44px kuralı */
        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mic-btn:active {
            transform: scale(0.95);
        }

        #mic-btn.listening {
            background-color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(207, 102, 121, 0); }
            100% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0); }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">Merhaba, ben dijital öğretmeninizim. Size nasıl yardımcı olabilirim?</div>
    </div>

    <div id="controls">
        <button id="mic-btn">🎤</button>
    </div>

    <script>
        // PWA Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker kayıtlı.', reg))
                .catch(err => console.error('Service Worker hatası:', err));
        }

        // DOM Elementleri
        const micBtn = document.getElementById('mic-btn');
        const chatContainer = document.getElementById('chat-container');

        // Web Speech API Tanımlamaları
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            // Sürekli dinleme (continuous) aktif. Sadece butona basıldığında kapanır.
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'tr-TR';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.textContent = '🛑'; // Dinliyor ikonu
            };

            recognition.onresult = (event) => {
                // Son söyleneni al
                const current = event.resultIndex;
                const transcript = event.results[current][0].transcript;
                
                addMessage(transcript, 'user-msg');
                processWithAI(transcript);
            };

            recognition.onerror = (event) => {
                console.error('Ses tanıma hatası:', event.error);
                if(event.error === 'not-allowed') {
                    stopListening();
                    alert("Mikrofon izni reddedildi.");
                }
            };

            recognition.onend = () => {
                // Eğer kullanıcı manuel kapatmadıysa, sistem kapatsa bile geri aç (continuous loop)
                if (isListening) {
                    recognition.start();
                } else {
                    micBtn.classList.remove('listening');
                    micBtn.textContent = '🎤';
                }
            };
        } else {
            alert("Tarayıcınız Web Speech API'yi desteklemiyor.");
        }

        function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            // DİNLEMEYE BAŞLARKEN ASİSTANIN CEVABINI BÖL (İptal et)
            if (synth.speaking) {
                synth.cancel();
            }
            isListening = true;
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            recognition.stop();
        }

        micBtn.addEventListener('click', toggleListening);

        function addMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // AI İşlem Fonksiyonu (Buraya kendi API çağrınızı entegre edebilirsiniz)
        async function processWithAI(text) {
            /* 
             * YAPAY ZEKA KİŞİLİK AYARI (Sistem İstemi - System Prompt)
             * AI API'nize istek atarken şu sistem komutunu gönderin:
             * "Sen kibar, sabırlı ve profesyonel bir öğretmensin. 
             * 'Canım', 'kızım', 'tatlım' gibi abartılı, aşırı samimi veya laubali hitaplar KULLANMA. 
             * Yanıtların net, saygılı, bilgi verici ve doğrudan olsun."
             */

            // Simüle edilmiş AI API Cevabı
            const mockAIResponse = `Söylediklerini anladım. Bir öğretmen olarak sana şu şekilde yardımcı olabilirim: "${text}" konusu üzerinde çalışmaya devam etmeliyiz.`;
            
            addMessage(mockAIResponse, 'ai-msg');
            speakText(mockAIResponse);
        }

        function speakText(text) {
            // Eğer yeni bir şey söylenecekse öncekini sustur (Cevap bölme mantığı)
            synth.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.0;
            // Öğretmen tonuna uygun olması adına sesi bir tık kalınlaştırıp yavaşlatabilirsiniz.
            utterance.pitch = 0.9; 
            
            synth.speak(utterance);
        }
    </script>
</body>
</html>
