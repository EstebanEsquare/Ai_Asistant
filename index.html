<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pamuk - Yapay Zeka Eğitmenim</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #bb86fc;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .character-pane {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c2c2c 0%, #121212 100%);
            border-right: 2px solid #333;
        }

        #cat-svg { width: 70%; height: auto; transition: transform 0.3s ease; }

        .chat-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            border-radius: 15px;
            background: var(--card-color);
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .ai-bubble { background: #3700b3; align-self: flex-start; }
        .user-bubble { background: var(--accent-color); color: #000; align-self: flex-end; }

        .controls { display: flex; justify-content: center; padding-bottom: 10px; }

        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: var(--accent-color);
            color: #000;
            cursor: pointer;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4);
        }

        #onboarding {
            position: fixed; inset: 0; background: #121212; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px; text-align: center;
        }

        input {
            padding: 15px; margin: 15px; width: 80%; max-width: 350px;
            border-radius: 10px; border: 2px solid var(--accent-color);
            background: transparent; color: white; font-size: 1.1rem;
        }

        .btn-primary {
            padding: 15px 40px; border-radius: 30px; border: none;
            background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="onboarding">
    <div id="step-1">
        <h2>Hoş Geldin! Ben Pamuk.</h2>
        <p>Lütfen OpenAI API Anahtarını gir:</p>
        <input type="password" id="api-key" placeholder="sk-...">
        <br><button class="btn-primary" onclick="saveApiKey()">Devam Et</button>
    </div>
    <div id="step-2" class="hidden">
        <h2 id="onboarding-text"></h2>
        <input type="text" id="user-input-data" placeholder="Cevabın...">
        <br><button class="btn-primary" onclick="nextOnboardingStep()">İleri</button>
    </div>
</div>

<div class="container">
    <div class="character-pane">
        <svg id="cat-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="#f0f0f0" />
            <circle cx="70" cy="80" r="10" fill="#000" />
            <circle cx="130" cy="80" r="10" fill="#000" />
            <path id="mouth" d="M 80 130 Q 100 140 120 130" stroke="#000" stroke-width="5" fill="transparent" />
            <polygon points="30,40 60,60 20,80" fill="#f0f0f0" />
            <polygon points="170,40 140,60 180,80" fill="#f0f0f0" />
        </svg>
    </div>
    <div class="chat-pane">
        <div id="chat-window"></div>
        <div class="controls">
            <button id="mic-btn">🎤</button>
        </div>
    </div>
</div>

<script>
    // Service Worker Kaydı
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW Kayıt Başarılı'))
                .catch(err => console.log('SW Kayıt Hatası:', err));
        });
    }

    let profile = JSON.parse(localStorage.getItem('pamuk_profile')) || {};
    let apiKey = localStorage.getItem('pamuk_api_key');
    let currentStep = 0;
    const steps = ["Adın ne?", "Kaç yaşındasın?", "Cinsiyetin ne?", "Kaçıncı sınıfa gidiyorsun?"];
    const keys = ["name", "age", "gender", "grade"];

    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'tr-TR';

    function saveApiKey() {
        const key = document.getElementById('api-key').value;
        if(key) {
            localStorage.setItem('pamuk_api_key', key);
            apiKey = key;
            startOnboarding();
        }
    }

    function startOnboarding() {
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        askStep();
    }

    function askStep() {
        document.getElementById('onboarding-text').innerText = steps[currentStep];
        speak(steps[currentStep]);
    }

    function nextOnboardingStep() {
        const val = document.getElementById('user-input-data').value;
        if(!val) return;
        profile[keys[currentStep]] = val;
        document.getElementById('user-input-data').value = "";
        currentStep++;
        if(currentStep < steps.length) {
            askStep();
        } else {
            localStorage.setItem('pamuk_profile', JSON.stringify(profile));
            document.getElementById('onboarding').classList.add('hidden');
            greetUser();
        }
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'tr-TR';
        utter.onstart = () => document.getElementById('mouth').setAttribute('d', 'M 80 130 Q 100 160 120 130');
        utter.onend = () => document.getElementById('mouth').setAttribute('d', 'M 80 130 Q 100 140 120 130');
        synth.speak(utter);
    }

    function greetUser() {
        const msg = `Hoş geldin ${profile.name}! Bugün hangi dersi çalışalım?`;
        addChatBubble(msg, 'ai');
        speak(msg);
    }

    function addChatBubble(text, sender) {
        const win = document.getElementById('chat-window');
        const b = document.createElement('div');
        b.className = `bubble ${sender}-bubble`;
        b.innerText = text;
        win.appendChild(b);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('mic-btn').onclick = () => recognition.start();
    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        addChatBubble(text, 'user');
        speak("Harika bir soru! Hemen inceliyorum.");
    };

    window.onload = () => {
        if (!apiKey) {
            document.getElementById('step-1').classList.remove('hidden');
        } else if (!profile.grade) {
            startOnboarding();
        } else {
            document.getElementById('onboarding').classList.add('hidden');
            greetUser();
        }
    };
</script>
</body>
</html>
