<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş AI Asistan & Test Paneli</title>
    <style>
        :root {
            --primary: #4285f4;
            --bg: #f8f9fa;
            --panel-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: var(--bg);
        }

        /* Sol Taraf: Sohbet Geçmişi */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        /* Sağ Taraf: Test Paneli */
        #quiz-panel {
            width: 400px;
            background: var(--panel-bg);
            padding: 30px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-box {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }

        .options-container {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #e8f0fe;
        }

        .option-btn.correct { background: #d4edda; border-color: #28a745; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; }

        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            background: #333;
            color: white;
            font-size: 0.9rem;
        }

        .mic-active { color: #ea4335; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="messages"></div>
    </div>

    <div id="quiz-panel">
        <div id="quiz-content" style="display: none;">
            <div class="question-box" id="question-text">Soru buraya gelecek?</div>
            <div class="options-container">
                <button class="option-btn" onclick="selectOption(0)" id="opt-0">A) </button>
                <button class="option-btn" onclick="selectOption(1)" id="opt-1">B) </button>
                <button class="option-btn" onclick="selectOption(2)" id="opt-2">C) </button>
                <button class="option-btn" onclick="selectOption(3)" id="opt-3">D) </button>
            </div>
        </div>
        <div id="start-screen" style="text-align: center;">
            <button onclick="initAssistant()" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 5px;">Asistanı Başlat</button>
            <p>Konuşmaya başlamak için tıklayın.</p>
        </div>
    </div>

    <div id="status">Durum: Beklemede</div>

    <script>
        let recognition;
        let synth = window.speechSynthesis;
        let isListening = false;
        let currentQuestion = null;

        // Test Verisi Örneği
        const quizData = [
            { q: "Türkiye'nin başkenti neresidir?", a: ["Ankara", "İstanbul", "İzmir", "Bursa"], correct: 0 },
            { q: "Hangi gezegen 'Kızıl Gezegen' olarak bilinir?", a: ["Venüs", "Mars", "Jüpiter", "Satürn"], correct: 1 }
        ];
        let quizIndex = 0;

        function initAssistant() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false; // Her cümle sonrası onend tetiklenmesi için false
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                updateStatus("Dinliyor...", true);
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase();
                processInput(text);
            };

            recognition.onend = () => {
                isListening = false;
                // Eğer asistan konuşmuyorsa dinlemeyi tekrar başlat (Sürekli dinleme döngüsü)
                if (!synth.speaking) {
                    recognition.start();
                }
            };

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-content').style.display = 'block';
            
            speak("Merhaba, ben asistanın. Teste hazır mısın? İlk soruyu soruyorum.");
            setTimeout(showQuestion, 2000);
        }

        function speak(text, callback) {
            // Konuşurken dinlemeyi durdur (kendi sesini duymasın)
            if (isListening) recognition.stop();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.1;

            utterance.onend = () => {
                updateStatus("Dinleme moduna geçiliyor...");
                recognition.start(); // Konuşma bitince dinlemeyi aç
                if (callback) callback();
            };

            synth.speak(utterance);
        }

        function showQuestion() {
            if (quizIndex >= quizData.length) {
                speak("Tebrikler, testi bitirdin!");
                return;
            }

            currentQuestion = quizData[quizIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`opt-${i}`);
                btn.innerText = `${String.fromCharCode(65 + i)}) ${currentQuestion.a[i]}`;
                btn.className = 'option-btn'; // Renkleri sıfırla
            }

            speak(`Soru ${quizIndex + 1}: ${currentQuestion.q}. Şıkları ekranda görebilir veya sesli söyleyebilirsin.`);
        }

        function processInput(text) {
            console.log("Duyulan:", text);
            updateStatus(`Duyulan: "${text}"`);

            // Şık kontrolü (Sesli yanıt)
            if (text.includes("a şıkkı") || text === "a") selectOption(0);
            else if (text.includes("b şıkkı") || text === "b") selectOption(1);
            else if (text.includes("c şıkkı") || text === "c") selectOption(2);
            else if (text.includes("d şıkkı") || text === "d") selectOption(3);
            // Kelime bazlı kontrol (Opsiyonel)
            else {
                const options = currentQuestion.a.map(opt => opt.toLowerCase());
                const foundIndex = options.findIndex(opt => text.includes(opt));
                if (foundIndex !== -1) selectOption(foundIndex);
            }
        }

        function selectOption(index) {
            if (!currentQuestion) return;

            const isCorrect = index === currentQuestion.correct;
            const btn = document.getElementById(`opt-${index}`);
            
            if (isCorrect) {
                btn.classList.add('correct');
                speak("Harika! Bu cevap doğru.", () => {
                    quizIndex++;
                    setTimeout(showQuestion, 1000);
                });
            } else {
                btn.classList.add('wrong');
                const dogruSik = String.fromCharCode(65 + currentQuestion.correct);
                speak(`Üzgünüm, bu yanlış. Doğru cevap ${dogruSik} şıkkı olmalıydı.`, () => {
                    quizIndex++;
                    setTimeout(showQuestion, 1000);
                });
            }
            currentQuestion = null; // Çift tetiklenmeyi önle
        }

        function updateStatus(msg, active = false) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `Durum: <span class="${active ? 'mic-active' : ''}">${msg}</span>`;
        }
    </script>
</body>
</html>
