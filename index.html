<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Asistan Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #03dac6;
            --accent: #bb86fc;
            --text: #ffffff;
            --error: #cf6679;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sol Panel: Asistan Durumu */
        .assistant-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #333;
            padding: 20px;
        }
        .mic-status {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(3, 218, 198, 0.3);
            transition: all 0.3s;
        }
        .mic-active {
            animation: pulse 1.5s infinite;
            background: var(--accent);
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(187, 134, 252, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(187, 134, 252, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(187, 134, 252, 0); }
        }

        /* Sağ Panel: Test Arayüzü */
        .quiz-panel {
            flex: 1.5;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #161616;
        }
        .question-box {
            font-size: 1.4rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .options-container {
            display: grid;
            gap: 15px;
        }
        .option-btn {
            background: var(--card);
            border: 2px solid #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            min-height: 55px;
            transition: 0.2s;
        }
        .option-btn:active, .option-btn.selected {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="assistant-panel">
        <div id="micIcon" class="mic-status">🎤</div>
        <div id="statusText">Dinlemeye başlamak için dokunun</div>
        <button id="startBtn" style="margin-top:20px; padding: 10px 20px; border-radius: 20px;">Sürekli Dinlemeyi Başlat</button>
    </div>

    <div class="quiz-panel hidden" id="quizPanel">
        <div class="question-box" id="questionText">Soru yükleniyor...</div>
        <div class="options-container" id="optionsGrid">
            <!-- Şıklar buraya gelecek -->
        </div>
    </div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const synth = window.speechSynthesis;
        
        recognition.lang = 'tr-TR';
        recognition.continuous = true; // Kesintisiz dinleme
        recognition.interimResults = false;

        let isListening = false;
        let currentQuestionIndex = 0;
        let waitingForAnswer = false;

        const questions = [
            { q: "PMP terminolojisinde, 'Kritik Yol' projenin neyini belirler?", a: ["Bütçeyi", "Minimum süreyi", "Riskleri", "Kaliteyi"], correct: 1 },
            { q: "Bir mekanik tasarımda, emniyet katsayısı hangisinden büyüktür?", a: ["0", "0.5", "1", "10"], correct: 2 }
        ];

        // --- SES YÖNETİMİ ---
        function speak(text, callback) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            // Gemini benzeri ses seçimi (Android Google sesleri genellikle en iyisidir)
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.name.includes('Google') && v.lang === 'tr-TR') || voices[0];
            utter.rate = 1.0;
            utter.onend = () => { if(callback) callback(); };
            synth.speak(utter);
        }

        // --- TEST MANTIĞI ---
        function loadQuestion() {
            waitingForAnswer = true;
            const data = questions[currentQuestionIndex];
            document.getElementById('quizPanel').classList.remove('hidden');
            document.getElementById('questionText').innerText = data.q;
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            data.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}: ${opt}`;
                btn.onclick = () => handleAnswer(index);
                grid.appendChild(btn);
            });

            speak(data.q + ". Şıklar şöyle: " + data.a.join(", "));
        }

        function handleAnswer(index) {
            if (!waitingForAnswer) return;
            waitingForAnswer = false;
            
            const correct = questions[currentQuestionIndex].correct;
            if (index === correct) {
                speak("Tebrikler, doğru cevap!", nextQuestion);
            } else {
                speak("Maalesef yanlış. Doğru cevap: " + questions[currentQuestionIndex].a[correct], nextQuestion);
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                setTimeout(loadQuestion, 1000);
            } else {
                speak("Test tamamlandı. Harika iş çıkardın.");
                document.getElementById('quizPanel').classList.add('hidden');
            }
        }

        // --- SES TANIMA ---
        recognition.onresult = (event) => {
            const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Duyulan:", result);

            if (result.includes("başla") || result.includes("test yap")) {
                loadQuestion();
            }

            // Şık kontrolü (A, B, C, D veya metin olarak)
            if (waitingForAnswer) {
                if (result.includes("a şıkkı") || result.includes("birinci")) handleAnswer(0);
                else if (result.includes("b şıkkı") || result.includes("ikinci")) handleAnswer(1);
                else if (result.includes("c şıkkı") || result.includes("üçüncü")) handleAnswer(2);
                else if (result.includes("d şıkkı") || result.includes("dördüncü")) handleAnswer(3);
            }
        };

        recognition.onend = () => {
            if (isListening) recognition.start(); // Bağlantı koparsa otomatik tekrar başlat
        };

        document.getElementById('startBtn').onclick = () => {
            isListening = true;
            recognition.start();
            document.getElementById('micIcon').classList.add('mic-active');
            document.getElementById('statusText').innerText = "Dinliyorum...";
            speak("Asistan hazır. Teste başlamak için 'başla' diyebilirsin.");
        };
    </script>
</body>
</html>
